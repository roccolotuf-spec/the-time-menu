<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Time - Digital Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
        <!-- Aggiungiamo il tag per il logo dentro la cartella assets -->
        <img src="assets/logo.png" alt="Logo The Time" style="max-width: 120px; margin-bottom: 10px;">
        <div class="logo-title">Welcome To</div>
        <h1>THE TIME</h1>
    </header>

    <main id="menu-container">
        </main>

        <div class="admin-panel" style="margin-top: 5px; padding: 20px; background: rgba(201, 160, 84, 0.1); border: 1px dashed #c9a054; border-radius: 8px;">
        <h3 style="color: #c9a054; text-align: center; margin-bottom: 15px; font-size: 16px; text-transform: uppercase;">Pannello Admin Live Demo</h3>
        <form id="admin-form">
            <div style="margin-bottom: 10px;">
                <label style="display:block; font-size:12px; margin-bottom:3px;">Seleziona Categoria:</label>
                <select id="admin-category" style="width:100%; padding:8px; background:#12241b; color:#fff; border:1px solid #c9a054; border-radius:4px;">
                    <option value="Special Cocktails">Special Cocktails</option>
                    <option value="Birreria">Birreria</option>
                </select>
            </div>
            <div style="margin-bottom: 10px;">
                <label style="display:block; font-size:12px; margin-bottom:3px;">Nome Prodotto:</label>
                <input type="text" id="admin-name" required placeholder="Es. Mojito" style="width:100%; padding:8px; background:#12241b; color:#fff; border:1px solid #c9a054; border-radius:4px;">
            </div>
            <div style="margin-bottom: 10px;">
                <label style="display:block; font-size:12px; margin-bottom:3px;">Prezzo (Senza simbolo €):</label>
                <input type="text" id="admin-price" required placeholder="Es. 5,50" style="width:100%; padding:8px; background:#12241b; color:#fff; border:1px solid #c9a054; border-radius:4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:12px; margin-bottom:3px;">Descrizione/Ingredienti:</label>
                <textarea id="admin-desc" placeholder="Es. Rum, menta, lime..." style="width:100%; padding:8px; background:#12241b; color:#fff; border:1px solid #c9a054; border-radius:4px; font-family:inherit;"></textarea>
            </div>
            <button type="submit" style="width:100%; padding:10px; background:#c9a054; color:#12241b; font-weight:bold; border:none; border-radius:4px; cursor:pointer; text-transform:uppercase;">Aggiungi al Menu al volo</button>
        </form>
    </div>

    <footer>
        <p>© Powered by Mamma ho fame Technology</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
